---
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        type: string
      release_evidence_json:
        description: 'JSON evidence proving HLK/WHQL, HVCI, Memory Integrity, install, identity, and cleanup gates.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  windows-release:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64

      - name: Install WDK
        shell: pwsh
        run: |
          $wdfPath = 'C:\Program Files (x86)\Windows Kits\10\Include\wdf\umdf\2.25'
          if (-not (Test-Path $wdfPath)) {
            winget install --id Microsoft.WindowsWDK.10.0.26100 --exact --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
          }

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = '${{ github.ref_name }}'
          }
          if ($version -notmatch '^v\d+\.\d+\.\d+([.-][0-9A-Za-z][0-9A-Za-z.-]*)?$') {
            throw "Release version must be a v-prefixed semantic version tag: $version"
          }
          git fetch --force --tags origin $version
          $commit = git rev-list -n 1 $version --
          if ([string]::IsNullOrWhiteSpace($commit)) {
            throw "Release tag does not exist: $version"
          }
          git checkout --detach $version
          $packageVersion = $version.TrimStart('v')
          "version=$version" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "commit=$commit" >> $env:GITHUB_OUTPUT

      - name: Determine release validation mode
        id: release_mode
        shell: pwsh
        env:
          RELEASE_EVIDENCE_JSON: ${{ github.event.inputs.release_evidence_json || vars.LIBVIRTUALDISPLAY_RELEASE_EVIDENCE_JSON }}
        run: |
          $hasProductionEvidence = -not [string]::IsNullOrWhiteSpace($env:RELEASE_EVIDENCE_JSON)
          "production=$($hasProductionEvidence.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "prerelease=$(( -not $hasProductionEvidence ).ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Validate release evidence
        if: steps.release_mode.outputs.production == 'true'
        shell: pwsh
        env:
          RELEASE_EVIDENCE_JSON: ${{ github.event.inputs.release_evidence_json || vars.LIBVIRTUALDISPLAY_RELEASE_EVIDENCE_JSON }}
        run: |
          ./tools/validate_release_evidence.ps1 -EvidenceJson $env:RELEASE_EVIDENCE_JSON -ExpectedTag '${{ steps.version.outputs.version }}' -ExpectedCommit '${{ steps.version.outputs.commit }}'

      - name: Verify WDK paths
        shell: pwsh
        run: |
          $defaultKitRoot = 'C:\Program Files (x86)\Windows Kits\10\'
          $kitRoot = if ($env:WindowsSdkDir) { $env:WindowsSdkDir } else { $defaultKitRoot }
          $sdkVersion = if ($env:WindowsSDKVersion) { $env:WindowsSDKVersion.TrimEnd('\') } else {
            Get-ChildItem (Join-Path $defaultKitRoot 'Lib') -Directory |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
              Sort-Object Name -Descending |
              Select-Object -First 1 -ExpandProperty Name
          }
          $iddcxPath = "Lib\$sdkVersion\um\x64\iddcx\1.10\IddCxStub.lib"
          if (-not (Test-Path (Join-Path $kitRoot $iddcxPath)) -and
              (Test-Path (Join-Path $defaultKitRoot $iddcxPath))) {
            $kitRoot = $defaultKitRoot
          }
          $required = @(
            Join-Path $kitRoot 'Include\wdf\umdf\2.25'
            Join-Path $kitRoot 'Lib\wdf\umdf\x64\2.25\WdfDriverStubUm.lib'
            Join-Path $kitRoot $iddcxPath
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required WDK path is missing: $path"
            }
          }

      - name: Configure
        run: >
          cmake -S . -B build-driver -G Ninja
          -DBUILD_TESTS=OFF
          -DBUILD_SUNSHINE_VIRTUAL_DISPLAY_DRIVER=ON
          -DBUILD_VIRTUALDISPLAY_PROBE=ON
          '-DLIBVIRTUALDISPLAY_PACKAGE_VERSION=${{ steps.version.outputs.package_version }}'

      - name: Build release package
        run: cmake --build build-driver --target package --parallel

      - name: Validate release package evidence
        if: steps.release_mode.outputs.production == 'true'
        shell: pwsh
        env:
          RELEASE_EVIDENCE_JSON: ${{ github.event.inputs.release_evidence_json || vars.LIBVIRTUALDISPLAY_RELEASE_EVIDENCE_JSON }}
        run: |
          ./tools/validate_release_evidence.ps1 -EvidenceJson $env:RELEASE_EVIDENCE_JSON -ExpectedTag '${{ steps.version.outputs.version }}' -ExpectedCommit '${{ steps.version.outputs.commit }}' -PackagePath 'build-driver/libvirtualdisplay-*-windows-x64.zip'

      - name: Generate CI package evidence
        shell: pwsh
        run: |
          $package = @(Get-ChildItem -Path 'build-driver/libvirtualdisplay-*-windows-x64.zip' -File)
          if ($package.Count -ne 1) {
            throw "Expected exactly one release package, found $($package.Count)."
          }

          $hash = (Get-FileHash -LiteralPath $package[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $productionEvidenceValidated = [bool]::Parse('${{ steps.release_mode.outputs.production }}')
          $certification = if ($productionEvidenceValidated) {
            'HLK/WHQL evidence supplied and validated'
          } else {
            'No HLK/WHQL evidence supplied; CI package is not Windows Certified'
          }
          $evidence = [ordered] @{
            tag = '${{ steps.version.outputs.version }}'
            commit_sha = '${{ steps.version.outputs.commit }}'
            package = $package[0].Name
            package_sha256 = $hash
            package_size = $package[0].Length
            windows_sdk_version = $env:WindowsSDKVersion
            wdk_umdf_version = '2.25'
            production_evidence_validated = $productionEvidenceValidated
            certification = $certification
          }
          $evidencePath = Join-Path 'build-driver' "libvirtualdisplay-${{ steps.version.outputs.package_version }}-evidence.json"
          $evidence | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $evidencePath -Encoding utf8

          $releaseNotesPath = Join-Path 'build-driver' 'release-notes.md'
          if ($productionEvidenceValidated) {
            $releaseNotes = @(
              'CI-built libvirtualdisplay package.'
              ''
              'Production release evidence was supplied and validated by `tools/validate_release_evidence.ps1`.'
              ''
              "Package SHA256: $hash"
            )
          } else {
            $releaseNotes = @(
              'CI-built libvirtualdisplay package.'
              ''
              'This package was built by GitHub Actions from `${{ steps.version.outputs.commit }}`.'
              ''
              'No HLK/WHQL production release evidence was supplied, so this GitHub release is marked as a prerelease and must not be described as Windows Certified.'
              ''
              "Package SHA256: $hash"
            )
          }
          $releaseNotes | Set-Content -LiteralPath $releaseNotesPath -Encoding utf8

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: libvirtualdisplay ${{ steps.version.outputs.version }}
          body_path: build-driver/release-notes.md
          prerelease: ${{ steps.release_mode.outputs.prerelease }}
          files: |
            build-driver/libvirtualdisplay-*-windows-x64.zip
            build-driver/libvirtualdisplay-*-evidence.json
