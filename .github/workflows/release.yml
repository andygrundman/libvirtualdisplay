---
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  windows-release:
    name: Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Configure MSVC
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64

      - name: Install WDK
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $defaultKitRoot = 'C:\Program Files (x86)\Windows Kits\10\'

          function Find-UsableSdkVersion($root) {
            if ([string]::IsNullOrWhiteSpace($root) -or -not (Test-Path (Join-Path $root 'Lib'))) {
              return $null
            }
            $versions = Get-ChildItem (Join-Path $root 'Lib') -Directory |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
              Sort-Object { [version]$_.Name } -Descending |
              Select-Object -ExpandProperty Name

            foreach ($version in $versions) {
              $required = @(
                Join-Path $root 'Include\wdf\umdf\2.25'
                Join-Path $root 'Lib\wdf\umdf\x64\2.25\WdfDriverStubUm.lib'
                Join-Path $root "Lib\$version\um\x64\iddcx\1.10\IddCxStub.lib"
              )
              if (($required | Where-Object { -not (Test-Path $_) }).Count -eq 0) {
                return $version
              }
            }
            return $null
          }

          $kitRoot = if ($env:WindowsSdkDir) { $env:WindowsSdkDir } else { $defaultKitRoot }
          $sdkVersion = Find-UsableSdkVersion $kitRoot
          if (-not $sdkVersion -and $kitRoot -ne $defaultKitRoot) {
            $kitRoot = $defaultKitRoot
            $sdkVersion = Find-UsableSdkVersion $kitRoot
          }
          if (-not $sdkVersion) {
            winget install --id Microsoft.WindowsWDK.10.0.26100 --exact --silent --accept-package-agreements --accept-source-agreements --disable-interactivity
            $kitRoot = $defaultKitRoot
            $sdkVersion = Find-UsableSdkVersion $kitRoot
          }
          if (-not $sdkVersion) {
            throw 'Unable to find a WDK/SDK version with required WDF and IddCx files.'
          }
          "WindowsSdkDir=$kitRoot" >> $env:GITHUB_ENV
          "WindowsSDKVersion=$sdkVersion" >> $env:GITHUB_ENV

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = '${{ github.ref_name }}'
          }
          $semverPattern = '^v(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          if ($version -notmatch $semverPattern) {
            throw "Release version must be a v-prefixed semantic version tag: $version"
          }
          git fetch --force --tags origin $version
          $commit = git rev-list -n 1 $version --
          if ([string]::IsNullOrWhiteSpace($commit)) {
            throw "Release tag does not exist: $version"
          }
          git checkout --detach $version
          $packageVersion = $version.TrimStart('v')
          "version=$version" >> $env:GITHUB_OUTPUT
          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT
          "commit=$commit" >> $env:GITHUB_OUTPUT

      - name: Verify WDK paths
        shell: pwsh
        run: |
          $defaultKitRoot = 'C:\Program Files (x86)\Windows Kits\10\'
          $kitRoot = if ($env:WindowsSdkDir) { $env:WindowsSdkDir } else { $defaultKitRoot }
          $sdkVersion = if ($env:WindowsSDKVersion) { $env:WindowsSDKVersion.TrimEnd('\') } else {
            Get-ChildItem (Join-Path $defaultKitRoot 'Lib') -Directory |
              Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
              Sort-Object Name -Descending |
              Select-Object -First 1 -ExpandProperty Name
          }
          $iddcxPath = "Lib\$sdkVersion\um\x64\iddcx\1.10\IddCxStub.lib"
          if (-not (Test-Path (Join-Path $kitRoot $iddcxPath)) -and
              (Test-Path (Join-Path $defaultKitRoot $iddcxPath))) {
            $kitRoot = $defaultKitRoot
          }
          $required = @(
            Join-Path $kitRoot 'Include\wdf\umdf\2.25'
            Join-Path $kitRoot 'Lib\wdf\umdf\x64\2.25\WdfDriverStubUm.lib'
            Join-Path $kitRoot $iddcxPath
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Required WDK path is missing: $path"
            }
          }

      - name: Import release signing certificate
        id: signing_cert
        shell: pwsh
        env:
          VDD_SIGNING_CERT_PFX_BASE64: ${{ secrets.VDD_SIGNING_CERT_PFX_BASE64 }}
          VDD_SIGNING_CERT_PASSWORD: ${{ secrets.VDD_SIGNING_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:VDD_SIGNING_CERT_PFX_BASE64)) {
            throw 'VDD_SIGNING_CERT_PFX_BASE64 is required for release driver catalog signing.'
          }
          if ([string]::IsNullOrWhiteSpace($env:VDD_SIGNING_CERT_PASSWORD)) {
            throw 'VDD_SIGNING_CERT_PASSWORD is required for release driver catalog signing.'
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP 'sunshine-virtual-display-driver-release-signing.pfx'
          [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:VDD_SIGNING_CERT_PFX_BASE64))

          $password = ConvertTo-SecureString $env:VDD_SIGNING_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $password
          Remove-Item -LiteralPath $pfxPath -Force

          if (-not $cert.HasPrivateKey) {
            throw 'Imported release signing certificate does not include a private key.'
          }

          $cerPath = Join-Path $env:RUNNER_TEMP 'sunshine-virtual-display-driver-release-signing.cer'
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          certutil.exe -user -f -addstore Root $cerPath
          if ($LASTEXITCODE -ne 0) {
            throw "certutil failed to add release certificate to CurrentUser\Root with exit code $LASTEXITCODE"
          }
          certutil.exe -user -f -addstore TrustedPublisher $cerPath
          if ($LASTEXITCODE -ne 0) {
            throw "certutil failed to add release certificate to CurrentUser\TrustedPublisher with exit code $LASTEXITCODE"
          }

          "thumbprint=$($cert.Thumbprint)" >> $env:GITHUB_OUTPUT
          "cert_path=$cerPath" >> $env:GITHUB_OUTPUT

      - name: Configure
        run: >
          cmake -S . -B build-driver -G Ninja
          -DBUILD_TESTS=OFF
          -DBUILD_SUNSHINE_VIRTUAL_DISPLAY_DRIVER=ON
          -DBUILD_VIRTUALDISPLAY_TOOLS=ON
          -DBUILD_VIRTUALDISPLAY_PROBE=ON
          '-DLIBVIRTUALDISPLAY_PACKAGE_VERSION=${{ steps.version.outputs.package_version }}'

      - name: Build driver package files
        run: cmake --build build-driver --target SunshineVirtualDisplayDriverPackageFiles --parallel

      - name: Sign driver catalog
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $kitsRoot = (Get-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows Kits\Installed Roots' -Name KitsRoot10).KitsRoot10
          $signtool = Get-ChildItem -LiteralPath (Join-Path $kitsRoot 'bin') -Recurse -Filter signtool.exe -File -ErrorAction SilentlyContinue |
            Sort-Object -Property FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            throw "signtool.exe was not found under $kitsRoot."
          }

          $catalog = Resolve-Path -LiteralPath 'build-driver/src/driver/windows_driver/sunshinevirtualdisplaydriver.cat'
          & $signtool.FullName sign /fd SHA256 /sha1 '${{ steps.signing_cert.outputs.thumbprint }}' $catalog.Path
          if ($LASTEXITCODE -ne 0) {
            throw "signtool sign failed with exit code $LASTEXITCODE"
          }

          & $signtool.FullName verify /pa $catalog.Path
          if ($LASTEXITCODE -ne 0) {
            throw "signtool verify failed with exit code $LASTEXITCODE"
          }

      - name: Build release package
        run: cmake --build build-driver --target package --parallel

      - name: Add signing certificate to release package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $package = @(Get-ChildItem -Path 'build-driver/libvirtualdisplay-*-windows-x64.zip' -File)
          if ($package.Count -ne 1) {
            throw "Expected exactly one release package, found $($package.Count)."
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP 'libvirtualdisplay-release-package'
          if (Test-Path -LiteralPath $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }

          Expand-Archive -LiteralPath $package[0].FullName -DestinationPath $extractRoot
          $driverDirectory = Get-ChildItem -LiteralPath $extractRoot -Recurse -Directory -Filter driver |
            Select-Object -First 1
          if (-not $driverDirectory) {
            throw 'Release package driver directory was not found.'
          }

          Copy-Item -LiteralPath '${{ steps.signing_cert.outputs.cert_path }}' -Destination (Join-Path $driverDirectory.FullName 'SunshineVirtualDisplayDriver.cer') -Force
          Remove-Item -LiteralPath $package[0].FullName -Force
          Compress-Archive -Path (Join-Path $extractRoot '*') -DestinationPath $package[0].FullName -Force

      - name: Generate package evidence
        shell: pwsh
        run: |
          $package = @(Get-ChildItem -Path 'build-driver/libvirtualdisplay-*-windows-x64.zip' -File)
          if ($package.Count -ne 1) {
            throw "Expected exactly one release package, found $($package.Count)."
          }

          $hash = (Get-FileHash -LiteralPath $package[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $evidence = [ordered] @{
            tag = '${{ steps.version.outputs.version }}'
            commit_sha = '${{ steps.version.outputs.commit }}'
            package = $package[0].Name
            package_sha256 = $hash
            package_size = $package[0].Length
            windows_sdk_version = $env:WindowsSDKVersion
            wdk_umdf_version = '2.25'
            signing = [ordered] @{
              channel = 'self-signed'
              certificate_thumbprint = '${{ steps.signing_cert.outputs.thumbprint }}'
            }
            certification = 'Self-signed CI package; no EV, HLK, WHQL, or Windows certification claim'
          }
          $evidencePath = Join-Path 'build-driver' "libvirtualdisplay-${{ steps.version.outputs.package_version }}-evidence.json"
          $evidence | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $evidencePath -Encoding utf8

          $releaseNotesPath = Join-Path 'build-driver' 'release-notes.md'
          $releaseNotes = @(
            'CI-built libvirtualdisplay package.'
            ''
            'This package was built by GitHub Actions from `${{ steps.version.outputs.commit }}`.'
            ''
            'Driver package signing model: self-signed. This release does not claim EV, HLK, WHQL, or Windows certification.'
            ''
            'Driver catalog certificate thumbprint: `${{ steps.signing_cert.outputs.thumbprint }}`.'
            ''
            "Package SHA256: $hash"
          )
          $releaseNotes | Set-Content -LiteralPath $releaseNotesPath -Encoding utf8

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: libvirtualdisplay ${{ steps.version.outputs.version }}
          body_path: build-driver/release-notes.md
          prerelease: false
          overwrite_files: true
          files: |
            build-driver/libvirtualdisplay-*-windows-x64.zip
            build-driver/libvirtualdisplay-*-evidence.json
